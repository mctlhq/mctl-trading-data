name: Claude PR review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions: {}

jobs:
  review:
    if: >
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude review') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - name: Gate comment-triggered runs (write permission + same-repo)
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERM=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission" --jq .permission)
          case "$PERM" in
            admin|maintain|write) ;;
            *) echo "::error::@claude review requires write access (commenter has: $PERM)"; exit 1 ;;
          esac
          CROSS=$(gh pr view "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --json isCrossRepository --jq .isCrossRepository)
          if [ "$CROSS" != "false" ]; then
            echo "::error::comment-triggered review is not supported on fork PRs"
            exit 1
          fi

      - name: Resolve PR branch for issue_comment trigger
        if: github.event_name == 'issue_comment'
        id: pr-ref
        run: |
          ref=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName -q .headRefName)
          echo "ref=$ref" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ steps.pr-ref.outputs.ref }}

      - name: Classify PR complexity and pick model
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number || github.event.issue.number }}
          files=$(gh pr view "$PR" --repo ${{ github.repository }} \
            --json files --jq '[.files[].path] | join("\n")')
          lines=$(gh pr diff "$PR" --repo ${{ github.repository }} 2>/dev/null \
            | grep -c '^[+-][^+-]' || echo 0)
          score=1
          while IFS= read -r f; do
            if echo "$f" | grep -qE '^internal/(auth|crypto|db|mcp|telegram)/'; then
              score=3; break
            elif echo "$f" | grep -qE '\.go$' && ! echo "$f" | grep -qE '_test\.go$'; then
              [ $score -lt 2 ] && score=2
            fi
          done <<< "$files"
          if [ "$lines" -gt 400 ] && [ $score -lt 3 ]; then
            score=$((score + 1))
          fi
          case $score in
            3) model="claude-opus-4-7" ;;
            2) model="claude-sonnet-4-6" ;;
            *) model="claude-haiku-4-5-20251001" ;;
          esac
          echo "model=$model" >> $GITHUB_OUTPUT
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "lines=$lines" >> $GITHUB_OUTPUT
          echo "PR #$PR: model=$model score=$score lines=$lines"

      - name: Check fallback token availability
        id: token-check
        run: |
          if [ -n "$TOKEN2" ]; then
            echo "has_fallback=true" >> $GITHUB_OUTPUT
          else
            echo "has_fallback=false" >> $GITHUB_OUTPUT
          fi
        env:
          TOKEN2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}

      - name: Claude review
        id: review
        continue-on-error: true
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            You are the automated code reviewer for this pull request. Review
            the PR diff thoroughly.

            Focus on:
            - Correctness and logic errors; edge cases the change misses.
            - Security: injection, authentication/authorization, secret
              handling, unsafe input.
            - Error handling: ignored errors, missing context.
            - Test coverage: behaviour changed without a corresponding test.

            Follow the conventions in this repository's CLAUDE.md (Python style,
            conventional commits, English only, no emoji).

            If the diff is trivial — only config/values YAML (hostname, env
            var, image tag, resource limits, replica count), a dependency bump
            with no logic change, docs/comments, or a one-line typo — approve
            the PR with a one-line reason and nothing else:
            `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with a severity tag:
            - P1 — must fix before merge (bug, security hole, data loss).
            - P2 — should fix before merge (likely bug, missing test, unsafe
              pattern).
            - P3 — nice to have (style, minor nit); does not block merge.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review). Include the P1/P2/P3
            counts in the body; be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'

      - name: Reset git state before fallback
        if: steps.review.outcome == 'failure' && steps.token-check.outputs.has_fallback == 'true'
        run: git checkout . && git clean -fd

      - name: Claude review (fallback token)
        if: steps.review.outcome == 'failure' && steps.token-check.outputs.has_fallback == 'true'
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            You are the automated code reviewer for this pull request. Review
            the PR diff thoroughly.

            Focus on:
            - Correctness and logic errors; edge cases the change misses.
            - Security: injection, authentication/authorization, secret
              handling, unsafe input.
            - Error handling: ignored errors, missing context.
            - Test coverage: behaviour changed without a corresponding test.

            Follow the conventions in this repository's CLAUDE.md (Python style,
            conventional commits, English only, no emoji).

            If the diff is trivial — only config/values YAML (hostname, env
            var, image tag, resource limits, replica count), a dependency bump
            with no logic change, docs/comments, or a one-line typo — approve
            the PR with a one-line reason and nothing else:
            `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with a severity tag:
            - P1 — must fix before merge (bug, security hole, data loss).
            - P2 — should fix before merge (likely bug, missing test, unsafe
              pattern).
            - P3 — nice to have (style, minor nit); does not block merge.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review). Include the P1/P2/P3
            counts in the body; be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
